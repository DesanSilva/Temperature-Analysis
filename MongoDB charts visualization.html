<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Atlas Charts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .chart-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1600px;
            height: fit-content;
        }
        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #21313C;
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 10px 0 rgba(70, 76, 79, 0.2);
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <iframe src="https://charts.mongodb.com/charts-project-0-zysnewt/embed/charts?id=6b5fc634-ec40-4560-8433-262f179b7c10&maxDataAge=600&theme=dark&autoRefresh=true"></iframe>
        <iframe src="https://charts.mongodb.com/charts-project-0-zysnewt/embed/charts?id=9775b6ce-69ad-4a84-974a-e02dca4a011d&maxDataAge=600&theme=dark&autoRefresh=true"></iframe>
        <iframe src="https://charts.mongodb.com/charts-project-0-zysnewt/embed/charts?id=cfb3d94c-1605-4a29-a254-d9bee5b895f6&maxDataAge=600&theme=dark&autoRefresh=true"></iframe>
        <iframe src="https://charts.mongodb.com/charts-project-0-zysnewt/embed/charts?id=374c9510-59b3-42d1-94b8-855090ea8cc3&maxDataAge=600&theme=dark&autoRefresh=true"></iframe>
    </div>
</body>
</html>
